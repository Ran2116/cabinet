    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: rgb(218, 217, 217);
    }

    body { cursor: default; }

    #scroll-space { height: 1800vh; }

    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #noise  { opacity: 0; }
    #window { opacity: 0; }

    #fence {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      pointer-events: none;
    }

    #world {
      position: absolute;
      width: 300vw;
      height: 300vh;
      left: 0;
      top: 0;
      will-change: transform;
      transform-origin: top left;
      z-index: 10;
    }

    .cell {
      position: absolute;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      opacity: 0.1;
      background-image: url("noise.gif");
    }

    #c1 { left: 0vw;   top: 0vh;   }
    #c2 { left: 100vw; top: 0vh;   }
    #c3 { left: 200vw; top: 0vh;   }
    #c4 { left: 0vw;   top: 100vh; }
    #c5 { left: 100vw; top: 100vh; }
    #c6 { left: 200vw; top: 100vh; }
    #c7 { left: 0vw;   top: 200vh; }
    #c8 { left: 100vw; top: 200vh; }
    #c9 { left: 200vw; top: 200vh; }

    /* hotspot */
    .hotspot {
      position: absolute;
      display: block;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      z-index: 10;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .hotspot:active { opacity: 0.85; }

    /* window hotspot */
    .hotspot.window-type {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background-image: url("view.png");
      background-repeat: no-repeat;
      background-size: 300vw 300vh;
      opacity: 0;
      transition: opacity 0.22s ease;
      pointer-events: none;
    }

    .hotspot.window-type:hover .photo-overlay { opacity: 1; }

   /* cabinet hotspot */
    .hotspot.cabinet {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cab-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .hotspot.cabinet:hover .cab-img { opacity: 1; }

    .cab-label {
      position: relative;
      z-index: 2;
      font-size: 18px;
      font-family:'MyFont', serif;
      color:#FCCDAF;
      letter-spacing: 0.04em;
      text-align: center;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.22s ease;
      background: rgba(60, 55, 50, 0.62);
      padding: 4px 10px 5px;
      line-height: 1;
      display: inline-block;
      white-space: nowrap;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hotspot.cabinet:hover .cab-label { opacity: 0; }

 /* cabinet image */
    .cab-narrow { width: 11.7vw;  aspect-ratio: 90  / 130; }
    .cab-wide   { width: 35vw;    aspect-ratio: 270 / 130; }
    .cab-tall   { width: 23.5vw;  aspect-ratio: 180 / 260; }

  <script>
    const world    = document.getElementById("world");
    const hudText  = document.getElementById("hud-text");
    const hotspots = document.querySelectorAll(".hotspot");

    const path = [
      { x:   0, y:   0 },   // 0 · pos 1
      { x:   0, y: 100 },   // 1 · pos 4
      { x:   0, y: 200 },   // 2 · pos 7
      { x: 100, y: 200 },   // 3 · pos 8
      { x: 200, y: 200 },   // 4 · pos 9
      { x: 200, y: 100 },   // 5 · pos 6
      { x: 200, y:   0 },   // 6 · pos 3
      { x: 100, y:   0 },   // 7 · pos 2
      { x: 100, y: 100 }    // 8 · pos 5 (center)
    ];

    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function getScrollProgress() {
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      return maxScroll <= 0 ? 0 : window.scrollY / maxScroll;
    }

    function renderFromProgress(progress) {
      progress = clamp(progress, 0, 1);
      const segCount = path.length - 1;
      const scaled   = progress * segCount;
      const index    = Math.min(Math.floor(scaled), segCount - 1);
      const t        = scaled - index;
      const x = lerp(path[index].x, path[index + 1].x, t);
      const y = lerp(path[index].y, path[index + 1].y, t);
      world.style.transform = `translate(${-x}vw, ${-y}vh)`;
    }

    function scrollToPathIndex(index) {
      index = clamp(index, 0, path.length - 1);
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      window.scrollTo({ top: (index / (path.length - 1)) * maxScroll, behavior: "smooth" });
    }

    hotspots.forEach(hs => {
      hs.addEventListener("click", e => {
        if (hudText) hudText.textContent = `Clicked: ${hs.dataset.label || "navigation"}`;
        if (hs.dataset.targetIndex !== undefined) {
          e.preventDefault();
          scrollToPathIndex(Number(hs.dataset.targetIndex));
        }
      });
    });

    window.addEventListener("scroll", () => renderFromProgress(getScrollProgress()));
    window.addEventListener("resize", () => renderFromProgress(getScrollProgress()));
    renderFromProgress(getScrollProgress());

    
     (function () {
      var idx = sessionStorage.getItem('gotoPathIndex');
      if (idx !== null) {
        sessionStorage.removeItem('gotoPathIndex');
        var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo({ top: (Number(idx) / 8) * maxScroll, behavior: 'instant' });
      }
    })();

  </script>
