<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabinet</title>
  <style>
    @font-face {
      font-family: 'MyFont';
      src: url('Typewriter-Serial Regular.ttf');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #d0d0d0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'MyFont';
    }

    #fence {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      pointer-events: none;
      opacity: 0.3;
      z-index: 1;
    }

    #noise {
      position: fixed;
      inset: 0;
      background-image: url('noise.gif');
      background-repeat: repeat;
      background-size: auto;
      opacity: 0.2;
      pointer-events: none;
      z-index: 2;
    }

    .stack {
      position: relative;
      width: 46vw;
      height: 84vh;
      min-width: 320px;
      z-index: 10;
    }

    /* each paper uses --d (depth) set via inline style */
    .paper {
      position: absolute;
      inset: 0;
      background: #222222;
      border: 1px solid #ffffff;
      padding: 4.5vh 6vw 4vh;
      z-index: calc(100 - var(--d));
      
    }

    /* even-depth papers tilt right, odd-depth tilt left */
    .paper:nth-child(even) {
      transform:
        translateX(calc(var(--d) * 4px))
        translateY(calc(var(--d) * 3px))
        rotate(calc(var(--d) * 0.35deg));
    }

    .paper:nth-child(odd) {
      transform:
        translateX(calc(var(--d) * -4px))
        translateY(calc(var(--d) * 3px))
        rotate(calc(var(--d) * -0.35deg));
    }

    .text-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      row-gap: 1.55vh;
      column-gap: 0.3vw;
      height: 100%;
      align-content: start;
      overflow: hidden;
    }

    .cab-word {
      font-size: clamp(10px, 1vw, 15px);
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.02em;
      user-select: none;
      text-align: center;
      overflow: hidden;
    }

    .cab-word.special {
      color: #F8E884;
      cursor: pointer;
    }
  </style>
</head>
<body>

<img id="fence" src="fence3.jpg" alt="">
<div id="noise"></div>

<div class="stack" id="stack">

</div>

<script>
  const TOTAL        = 8;
  const COLS         = 7;
  const ROWS         = 22;
  const RETURN_INDEX = 2;  // cell 1

  
  const SPECIAL = [31, 84, 17, 107, 52, 139, 73, 96];

  const stack = document.getElementById('stack');

  function buildPaper(pageIndex, depth) {
    const paper = document.createElement('div');
    paper.className = 'paper';
    paper.style.setProperty('--d', depth);

    const grid = document.createElement('div');
    grid.className = 'text-grid';

    for (let i = 0; i < COLS * ROWS; i++) {
      const span = document.createElement('span');
      span.textContent = 'cabinet';
      if (i === SPECIAL[pageIndex]) {
        span.className = 'cab-word special';
        span.addEventListener('click', () => onSpecialClick(paper, pageIndex));
      } else {
        span.className = 'cab-word';
      }
      grid.appendChild(span);
    }

    paper.appendChild(grid);
    return paper;
  }

  function onSpecialClick(paper, pageIndex) {
    paper.remove();

    if (pageIndex === TOTAL - 1) {
      sessionStorage.setItem('gotoPathIndex', String(RETURN_INDEX));
      window.location.href = 'spiral.html';
    }
  }


  for (let i = TOTAL - 1; i >= 0; i--) {
    stack.appendChild(buildPaper(i, i));
  }
</script>

</body>
</html>
