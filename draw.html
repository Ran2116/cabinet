<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draw</title>
  <style>
    @font-face {
      font-family: 'MyFont';
      src: url('Typewriter-Serial Regular.ttf');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2vh;
      font-family: 'MyFont', 'Courier New', monospace;
    }

    #fence {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      pointer-events: none;
      opacity: 0.3;
      z-index: 1;
    }

    #noise {
      position: fixed;
      inset: 0;
      background-image: url('noise.gif');
      background-repeat: repeat;
      background-size: auto;
      opacity: 0.2;
      pointer-events: none;
      z-index: 2;
    }

    #instruction {
      font-size: clamp(11px, 1vw, 15px);
      color: #000000;
      letter-spacing: 0.08em;
      z-index:3;
    }

    #canvas {
      cursor: crosshair;
      display: block;
      z-index:3;
    }

    #submit {
      font-family: 'MyFont', monospace;
      font-size: clamp(11px, 1vw, 15px);
      letter-spacing: 0.12em;
      color: #292929;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      z-index:3;
    }

    #submit:hover { color: #000000; }
  </style>
</head>
<body>
<img id="fence" src="fence2.png" alt="">
<div id="noise"></div>
<p id="instruction">Please draw a cabinet</p>
<canvas id="canvas"></canvas>
<button id="submit">submit →</button>

<script>
  const RETURN_INDEX = 8;  // path index 3 = cell 8
  const STORAGE_KEY  = 'drawings';

  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  //canvas
  const W = Math.min(window.innerWidth * 0.52, 700);
  const H = W * 0.72;
  canvas.width  = W;
  canvas.height = H;

  //background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  
  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    [lastX, lastY] = getPos(e);
  });

  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    const [x, y] = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth   = 2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.stroke();
    [lastX, lastY] = [x, y];
  });

  canvas.addEventListener('mouseup',   () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);

  
  document.getElementById('submit').addEventListener('click', () => {
    const dataURL = canvas.toDataURL('image/png');
    const timestamp = Date.now();

   
    let saved = [];
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) {}
    saved.push({ id: timestamp, img: dataURL });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));

    
    sessionStorage.setItem('gotoPathIndex', String(RETURN_INDEX));
    window.location.href = 'spiral.html';
  });
</script>

</body>
</html>
