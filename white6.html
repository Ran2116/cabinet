<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    @font-face {
      font-family: 'MyFont';
      src: url('Typewriter-Serial Regular.ttf');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: rgb(184, 184, 184);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #fence {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      pointer-events: none;
      opacity: 0.3;
      z-index: 1;
    }

    #noise {
      position: fixed;
      inset: 0;
      background-image: url('noise.gif');
      background-repeat: repeat;
      background-size: auto;
      opacity: 0.2;
      pointer-events: none;
      z-index: 2;
    }

    .cab-link {
      position: fixed;
      bottom: 3.5vh;
      right: 3.5vw;
      font-family: 'MyFont', 'Courier New', monospace;
      font-size: clamp(14px, 1.2vw, 20px);
      color: #F8E884;
      text-decoration: none;
      cursor: pointer;
      z-index:3;
    }
  </style>
</head>
<body>
<img id="fence" src="fence2.png" alt="">
<div id="noise"></div>
<a class="cab-link" href="gallery.html">cabinet</a>

</body>
</html>
